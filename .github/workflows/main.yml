name: IO Scene AmusementVision GMA Release
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@master
      with:
        ref: master
        
    - name: Create "io_scene_avision_gma ZIP"
      uses: thedoctor0/zip-release@0.7.5
      with:
        type: 'zip'
        filename: 'io_scene_avision_gma.zip'
        exclusions: '*.git* .readme.md import_gml.py gml.py'
        directory: 'src/'
    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: io_scene_avision_gma
        path: .
